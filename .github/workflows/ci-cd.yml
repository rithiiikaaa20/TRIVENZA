name: TRIVENZA CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate frontend structure
        shell: bash
        run: |
          set -e
          echo "Checking frontend files..."
          test -d FRONTEND
          ls FRONTEND/*.html
          test -f FRONTEND/style.css
          test -f FRONTEND/script.js
          echo "Frontend validation passed."

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: BACKEND/package-lock.json

      - name: Install backend dependencies
        working-directory: BACKEND
        run: npm install

      - name: Run backend tests
        shell: bash
        working-directory: BACKEND
        run: |
          set -e
          TEST_SCRIPT=$(node -p "require('./package.json').scripts?.test || ''")
          if [ -z "$TEST_SCRIPT" ] || [ "$TEST_SCRIPT" = "echo \"Error: no test specified\" && exit 1" ]; then
            echo "No real Jest test script configured yet. Skipping backend test execution."
            exit 0
          fi
          npm test

  selenium-test:
    name: Selenium Test
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Selenium
        run: pip install selenium

      - name: Run Selenium suite
        shell: bash
        run: |
          set -e
          if [ -f selenium_test.py ]; then
            python selenium_test.py
          else
            echo "selenium_test.py not found. Skipping Selenium test job logic."
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: selenium-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        shell: bash
        run: |
          set -e
          if [ -f docker-compose.yml ]; then
            docker compose build
          elif [ -f docker-compose.yaml ]; then
            docker compose -f docker-compose.yaml build
          elif [ -f docker-compose.dev.yml ]; then
            docker compose -f docker-compose.dev.yml build
          elif [ -f docker-compose.dev.yaml ]; then
            docker compose -f docker-compose.dev.yaml build
          else
            echo "No Docker Compose file found. Skipping Docker build."
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Dummy deploy step
        run: echo "Deploy successful"
