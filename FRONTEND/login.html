<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - TRIVENZA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-shell min-h-screen flex flex-col relative overflow-hidden text-[#1F2937] bg-transparent">
  <div class="auth-backdrop">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-grid"></div>
    <div class="auth-overlay"></div>
  </div>

  <nav class="glass-nav text-[#1F2937] flex justify-between items-center px-6 md:px-16 py-4 sticky top-0 z-50">
    <h1 class="text-2xl font-serif font-black tracking-tight flex items-center gap-2 text-[#D68D8D]">
      <a href="/"><i class="fa-solid fa-leaf text-[#A8B5A2]"></i> TRIVENZA</a>
    </h1>
    <div class="hidden md:flex items-center space-x-10 text-sm font-bold tracking-tight">
      <a href="/" class="text-gray-500 hover:text-[#D68D8D] transition">Home</a>
      <a href="/communities" class="text-gray-500 hover:text-[#D68D8D] transition">Communities</a>
      <a href="/events" class="text-gray-500 hover:text-[#D68D8D] transition">Events</a>
      <a href="/fundraisers" class="text-gray-500 hover:text-[#D68D8D] transition">Fundraisers</a>
      <div id="nav-auth-state">
          <a href="/login" class="btn-soft px-7 py-2.5 ml-4 text-xs">Login</a>
      </div>
    </div>
  </nav>

  <div class="flex-grow flex items-center justify-center p-6 relative z-10">
      <div class="glass-panel auth-card p-8 md:p-12 rounded-[32px] shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#D68D8D]/10 text-[#D68D8D] rounded-full flex items-center justify-center text-2xl mx-auto mb-4 shadow-sm"><i class="fa-solid fa-user-lock"></i></div>
            <h2 class="text-3xl font-serif font-black text-[#1F2937] tracking-tight">Welcome Back</h2>
            <p class="text-gray-400 text-sm mt-3 font-medium">Login to access your mindful spaces.</p>
        </div>
        <form onsubmit="loginUser(event)">
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1 tracking-wider">Username</label>
                    <input id="login-username" type="text" placeholder="Enter your username" class="w-full p-4 rounded-xl bg-white/80 border border-[#E6DFFF] outline-none focus:border-[#C8B6FF] transition font-medium text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1 tracking-wider">Password</label>
                    <div class="relative">
                      <input id="login-password" type="password" placeholder="Enter your password" class="w-full p-4 pr-24 rounded-xl bg-white/80 border border-[#E6DFFF] outline-none focus:border-[#C8B6FF] transition font-medium text-sm" required>
                      <button id="toggle-password-btn" type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold uppercase tracking-wider text-[#D68D8D] hover:text-[#C07070] transition">Show</button>
                    </div>
                </div>
            </div>
            <div class="flex justify-end mb-6">
                <a href="#" onclick="forgotPassword(); return false;" class="text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-[#D68D8D] transition">Forgot Password?</a>
            </div>
            <button class="btn-soft w-full py-4 text-sm shadow-md">Secure Login</button>
        </form>
        <p class="text-center mt-8 text-sm font-semibold text-gray-500">
            Don't have an account? <a href="/signup" class="text-[#D68D8D] hover:text-[#C07070] transition border-b-2 border-transparent hover:border-[#D68D8D]">Sign up Here</a>
        </p>
      </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
